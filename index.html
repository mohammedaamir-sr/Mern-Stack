<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Local Audio &amp; Video Example</h1>

    <h2>Audio</h2>
    <p>Place a supported audio file (e.g. <code>audio.mp3</code>) in the same folder as this HTML file.</p>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <h2>Video</h2>
    <p>Place a supported video file (e.g. <code>video.mp4</code>) in the same folder as this HTML file.</p>
    <video controls width="640">
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video element.
    </video>
</body>
</html>
